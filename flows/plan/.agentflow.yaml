name: plan
description: Lightweight planning workflow — explore the problem, produce a plan
maxRevisions: 2

steps:
  - name: research
    description: Explore the codebase and understand the problem
    required: false
    requires: []
    generates: research.md
    generateStrategy: replace
    context:
      instructions: research.md

  - name: plan
    description: Create a clear, actionable implementation plan
    required: true
    requires:
      - research
    generates: plan.md
    generateStrategy: replace
    context:
      instructions: plan.md
      steps:
        - research
